# Source: teleport-cluster
apiVersion: v1
kind: ConfigMap
metadata:
  name: teleport-cluster-proxy
  namespace: teleport-cluster
  labels:
    app.kubernetes.io/name: teleport-cluster
    app.kubernetes.io/instance: teleport-cluster
    app.kubernetes.io/component: proxy
    app.kubernetes.io/version: 18.7.3
    teleport.dev/majorVersion: '18'
data:
  teleport.yaml: |
    auth_service:
      enabled: false
    proxy_service:
      enabled: true
      https_keypairs:
      - cert_file: /etc/teleport-tls/tls.crt
        key_file: /etc/teleport-tls/tls.key
      https_keypairs_reload_interval: 12h
      public_addr: test0.aws.noa.re:443
    ssh_service:
      enabled: false
    teleport:
      auth_server: teleport-cluster-auth.teleport-cluster.svc.cluster.local:3025
      join_params:
        method: kubernetes
        token_name: teleport-cluster-proxy
      log:
        format:
          extra_fields:
          - timestamp
          - level
          - component
          - caller
          output: text
        output: stderr
        severity: INFO
    version: v3
